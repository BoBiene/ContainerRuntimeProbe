name: docker-harness
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'docker/**'
      - 'src/**'
      - 'README.md'
      - '.github/workflows/docker-harness.yml'
jobs:
  docker-harness:
    runs-on: ubuntu-latest
    env:
      SOURCE_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: docker-default
            runtime: docker
            run-command: docker run --rm container-runtime-probe:test
          - name: docker-privileged
            runtime: docker
            run-command: docker run --rm --privileged container-runtime-probe:test
          - name: docker-host-network
            runtime: docker
            run-command: docker run --rm --network host container-runtime-probe:test
          - name: podman-rootless
            runtime: podman
            run-command: podman run --rm container-runtime-probe:test
    name: docker-harness (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_COMMIT_SHA }}
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Compute MinVer version
        id: version
        uses: thefringeninja/action-minver@d17a9972b2438ac870b45a6438c02311f91603ad # 2.0.0-preview1
        with:
          default-pre-release-phase: preview
          minimum-major-minor: 0.1
          tag-prefix: v
      - name: Install Podman
        if: matrix.runtime == 'podman'
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Build harness image
        shell: bash
        run: |
          set -euo pipefail
          ${{ matrix.runtime }} build \
            -f docker/Dockerfile.test \
            -t container-runtime-probe:test \
            --build-arg MINVER_VERSION_OVERRIDE=${{ steps.version.outputs.version }} \
            --build-arg MINVER_BUILD_METADATA=${{ env.SOURCE_COMMIT_SHA }} \
            .
      - name: Run harness container
        run: |
          set -euo pipefail
          ${{ matrix.run-command }} | tee harness.out
          grep -q -- '## Probe Tool Information' harness.out
          grep -Eq -- '- Git Commit: [0-9a-f]{7,}' harness.out
          grep -vq -- '- Git Commit: Unknown' harness.out
