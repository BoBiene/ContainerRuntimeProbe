name: Publish Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create GitHub releases and upload assets
  packages: write   # push to GitHub Packages (NuGet + Container Registry)

jobs:
  nuget-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for MinVer tag resolution
      - name: Compute MinVer version
        id: version
        uses: thefringeninja/action-minver@d17a9972b2438ac870b45a6438c02311f91603ad # 2.0.0-preview1
        with:
          default-pre-release-phase: preview
          minimum-major-minor: 0.1.0
          tag-prefix: v
      - name: Export MinVer override
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value "MINVERVERSIONOVERRIDE=${{ steps.version.outputs.version }}"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: dotnet build ContainerRuntimeProbe.sln -c Release
      - name: Pack
        run: dotnet pack ContainerRuntimeProbe.sln -c Release --no-build -o artifacts/packages
      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source \
            --username ${{ github.repository_owner }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source github \
            --skip-duplicate

  cli-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            asset_suffix: linux-x64
          - rid: linux-arm64
            asset_suffix: linux-arm64
          - rid: win-x64
            asset_suffix: win-x64.exe
          - rid: osx-x64
            asset_suffix: osx-x64
          - rid: osx-arm64
            asset_suffix: osx-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for MinVer tag resolution
      - name: Compute MinVer version
        id: version
        uses: thefringeninja/action-minver@d17a9972b2438ac870b45a6438c02311f91603ad # 2.0.0-preview1
        with:
          default-pre-release-phase: preview
          minimum-major-minor: 0.1.0
          tag-prefix: v
      - name: Export MinVer override
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value "MINVERVERSIONOVERRIDE=${{ steps.version.outputs.version }}"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish self-contained binary
        run: |
          dotnet publish src/ContainerRuntimeProbe.Tool/ContainerRuntimeProbe.Tool.csproj \
            -c Release -r ${{ matrix.rid }} \
            -p:PublishTrimmed=true --self-contained true \
            -o artifacts/cli/${{ matrix.rid }}
      - name: Prepare asset
        id: prepare_asset
        run: |
          BIN=artifacts/cli/${{ matrix.rid }}/ContainerRuntimeProbe.Tool
          [[ "${{ matrix.rid }}" == win-* ]] && BIN="${BIN}.exe"
          ASSET="artifacts/container-runtime-probe-${{ matrix.asset_suffix }}"
          cp "$BIN" "$ASSET"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.prepare_asset.outputs.asset }}

  docker-release-arch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
            runs_on: ubuntu-latest
            setup_qemu: false
            arm64_publish_aot: false
          - platform: linux/arm64
            suffix: arm64
            runs_on: ubuntu-24.04-arm
            setup_qemu: false
            arm64_publish_aot: true
          - platform: linux/arm/v7
            suffix: armv7
            runs_on: ubuntu-latest
            setup_qemu: true
            arm64_publish_aot: false
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for MinVer tag resolution
      - name: Compute MinVer version
        id: version
        uses: thefringeninja/action-minver@d17a9972b2438ac870b45a6438c02311f91603ad # 2.0.0-preview1
        with:
          default-pre-release-phase: preview
          minimum-major-minor: 0.1.0
          tag-prefix: v
      - name: Set up QEMU
        if: ${{ matrix.setup_qemu }}
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            ARM64_PUBLISH_AOT=${{ matrix.arm64_publish_aot }}
            MINVER_VERSION_OVERRIDE=${{ steps.version.outputs.version }}
            MINVER_BUILD_METADATA=${{ github.sha }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest-${{ matrix.suffix }}
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}-${{ matrix.suffix }}
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=docker-release-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=docker-release-${{ matrix.suffix }}

  docker-release-manifest:
    needs: docker-release-arch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute MinVer version
        id: version
        uses: thefringeninja/action-minver@d17a9972b2438ac870b45a6438c02311f91603ad # 2.0.0-preview1
        with:
          default-pre-release-phase: preview
          minimum-major-minor: 0.1.0
          tag-prefix: v
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Create latest manifest
        run: |
          docker buildx imagetools create \
            -t "${{ steps.image.outputs.name }}:latest" \
            "${{ steps.image.outputs.name }}:latest-amd64" \
            "${{ steps.image.outputs.name }}:latest-arm64" \
            "${{ steps.image.outputs.name }}:latest-armv7"
      - name: Create version manifest
        run: |
          docker buildx imagetools create \
            -t "${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}" \
            "${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}-amd64" \
            "${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}-arm64" \
            "${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}-armv7"
      - name: Create ref manifest
        run: |
          docker buildx imagetools create \
            -t "${{ steps.image.outputs.name }}:${{ github.ref_name }}" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}-amd64" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}-arm64" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}-armv7"
