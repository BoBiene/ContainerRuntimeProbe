name: Publish Preview

on:
  push:
    branches: [main, develop]

permissions:
  contents: read
  packages: write

jobs:
  nuget-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for MinVer tag resolution
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: dotnet build ContainerRuntimeProbe.sln -c Release
      - name: Pack
        run: dotnet pack ContainerRuntimeProbe.sln -c Release --no-build -o artifacts/packages
      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source \
            --username ${{ github.repository_owner }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source github \
            --skip-duplicate

  docker-preview-arch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
            runs_on: ubuntu-latest
            setup_qemu: false
            arm64_publish_aot: false
          - platform: linux/arm64
            suffix: arm64
            runs_on: ubuntu-24.04-arm
            setup_qemu: false
            arm64_publish_aot: true
          - platform: linux/arm/v7
            suffix: armv7
            runs_on: ubuntu-latest
            setup_qemu: true
            arm64_publish_aot: false
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for MinVer tag resolution
      - name: Set up QEMU
        if: ${{ matrix.setup_qemu }}
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Build and push preview image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            ARM64_PUBLISH_AOT=${{ matrix.arm64_publish_aot }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:preview-${{ matrix.suffix }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=docker-preview-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=docker-preview-${{ matrix.suffix }}

  docker-preview-manifest:
    needs: docker-preview-arch
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Create preview manifest
        run: |
          docker buildx imagetools create \
            -t "${{ steps.image.outputs.name }}:preview" \
            "${{ steps.image.outputs.name }}:preview-amd64" \
            "${{ steps.image.outputs.name }}:preview-arm64" \
            "${{ steps.image.outputs.name }}:preview-armv7"
      - name: Create commit manifest
        run: |
          docker buildx imagetools create \
            -t "${{ steps.image.outputs.name }}:${{ github.sha }}" \
            "${{ steps.image.outputs.name }}:${{ github.sha }}-amd64" \
            "${{ steps.image.outputs.name }}:${{ github.sha }}-arm64" \
            "${{ steps.image.outputs.name }}:${{ github.sha }}-armv7"
