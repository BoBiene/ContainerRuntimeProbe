name: Runtime sample
about: Share a ContainerRuntimeProbe sample to improve detection quality
labels: [sample, detection]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for sharing a runtime sample.
        Please do not include secrets, tokens, private hostnames, internal IPs, customer data, or raw cloud metadata documents.
  - type: textarea
    id: compact-sample
    attributes:
      label: Compact sample
      description: Paste the compact sample line generated by ContainerRuntimeProbe.
      render: text
      placeholder: crp1;cls=c1,rtD,api0,orc0,cl0,pv0;conf=cH,rtL,apiU,orcU,clU,pvU;host=os:deb12,ker:5.15.167.4-ms-wsl2,kf:WSL2,arch:x64,rhos:0;hw=cv:AMD,cf:AMD,lc:3,vc:16,mem:31G,lim:max,flg:sha256:ab12cd34;fp=sha256:01234567,st:KernelOnly,n:8,x:1;p=mk:S,env:S,proc:S,sbx:S,api:U,k8s:U,meta:S;sig=de,cg:docker,mt:overlay,kf:WSL2,wsl,api:0;sec=none
    validations:
      required: true
  - type: textarea
    id: expected-classification
    attributes:
      label: Expected classification
      description: Tell us what environment this was run in, e.g. Docker Desktop WSL2, AKS, ECS Fargate, Siemens Industrial Edge.
    validations:
      required: false
  - type: textarea
    id: full-report
    attributes:
      label: Full redacted report
      description: Optional but very helpful. Attach or paste my-report.json after reviewing it.
      render: json
    validations:
      required: false
